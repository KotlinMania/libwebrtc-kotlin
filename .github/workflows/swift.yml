name: Build (Swift)

on:
  workflow_call:

permissions:
  contents: read

env:
  KOTLINMANIA_LOCAL_CACHE_DIR: ${{ github.workspace }}/.local
  GRADLE_USER_HOME: ${{ github.workspace }}/.local/gradle/user-home
  KONAN_DATA_DIR: ${{ github.workspace }}/.local/konan
  HOME: ${{ github.workspace }}/.local/home
  CFFIXED_USER_HOME: ${{ github.workspace }}/.local/home
  TMPDIR: ${{ github.workspace }}/.local/tmp
  GRADLE_OPTS: -Duser.home=${{ github.workspace }}/.local/gradle/home -Djava.io.tmpdir=${{ github.workspace }}/.local/tmp -Dkotlin.data.dir=${{ github.workspace }}/.local/konan -Dkonan.data.dir=${{ github.workspace }}/.local/konan
  CLANG_MODULE_CACHE_PATH: ${{ github.workspace }}/.local/xcode/clang-module-cache
  KOTLINMANIA_REPO_ROOT: ${{ github.workspace }}

jobs:
  build:
    name: Build and Test (Swift)
    runs-on: macos-26
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5.2.0
        with:
          distribution: zulu
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.1.0

      - name: Prepare local Swift and Xcode caches
        run: |
          mkdir -p \
            "$HOME" \
            "$TMPDIR" \
            "$CLANG_MODULE_CACHE_PATH" \
            "$KOTLINMANIA_LOCAL_CACHE_DIR/gradle/home" \
            "$KOTLINMANIA_LOCAL_CACHE_DIR/swiftpm/cache" \
            "$KOTLINMANIA_LOCAL_CACHE_DIR/swiftpm/config" \
            "$KOTLINMANIA_LOCAL_CACHE_DIR/swiftpm/security" \
            "$KOTLINMANIA_LOCAL_CACHE_DIR/swiftpm/scratch" \
            "$KOTLINMANIA_LOCAL_CACHE_DIR/xcode/result-bundles" \
            "${{ github.workspace }}/build/swift-tooling/bin" \
            "${{ github.workspace }}/build/swift-test"

          cat > "${{ github.workspace }}/build/swift-tooling/bin/xcodebuild" <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          repo_root="${KOTLINMANIA_REPO_ROOT:-$PWD}"
          local_cache="${KOTLINMANIA_LOCAL_CACHE_DIR:-$repo_root/.local}"
          result_bundle="$local_cache/xcode/result-bundles/swift-export-$$.xcresult"
          exec /usr/bin/xcrun --no-cache xcodebuild -resultBundlePath "$result_bundle" "$@"
          EOF

          cat > "${{ github.workspace }}/build/swift-tooling/bin/swift" <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          exec /usr/bin/xcrun --no-cache swift "$@"
          EOF

          chmod +x \
            "${{ github.workspace }}/build/swift-tooling/bin/xcodebuild" \
            "${{ github.workspace }}/build/swift-tooling/bin/swift"

          echo "${{ github.workspace }}/build/swift-tooling/bin" >> "$GITHUB_PATH"

      - name: Print Swift / Xcode versions
        run: |
          swift --version
          xcodebuild -version

      # `embedSwiftExportForXcode` is the entry point for Kotlin's Swift
      # Export pipeline. Outside an `xcodebuild`-driven invocation, the
      # plugin's `BuildSPMSwiftExportPackage` task fails its property
      # validation because the environment variables Xcode normally injects
      # aren't present. The variables below cover what the plugin reads:
      #
      #   * SDK_NAME / ARCHS / CONFIGURATION — which slice to build.
      #   * BUILT_PRODUCTS_DIR / TARGET_BUILD_DIR — where to land the static
      #     archive and `.swiftmodule` bundles.
      #   * FRAMEWORKS_FOLDER_PATH — relative path inside BUILT_PRODUCTS_DIR
      #     where embedded frameworks would land.
      #   * MACOSX_DEPLOYMENT_TARGET — the minimum macOS version.
      #   * DEPLOYMENT_TARGET_SETTING_NAME — the indirection variable
      #     telling the plugin which deployment-target env var to read.
      #     Xcode sets this automatically per-target; outside Xcode it
      #     must be set explicitly or the task fails with
      #     `property 'deploymentTargetSettingName' doesn't have a
      #     configured value`.
      #
      # Output lands in `build/swift-test/`:
      #   * `libLibwebrtc.a` — the merged static archive containing
      #     every `@ExportedBridge`-annotated function emitted by
      #     `build/SwiftExport/macosArm64/Debug/**/*.kt`.
      #   * Four `.swiftmodule/` directories: Libwebrtc,
      #     KotlinRuntimeSupport, ExportedKotlinPackages, KotlinRuntime.
      - name: Build Swift Export package
        env:
          BUILT_PRODUCTS_DIR: ${{ github.workspace }}/build/swift-test
          TARGET_BUILD_DIR: ${{ github.workspace }}/build/swift-test
          SDK_NAME: macosx
          CONFIGURATION: Debug
          ARCHS: arm64
          FRAMEWORKS_FOLDER_PATH: Frameworks
          MACOSX_DEPLOYMENT_TARGET: "14.0"
          DEPLOYMENT_TARGET_SETTING_NAME: MACOSX_DEPLOYMENT_TARGET
        run: >
          ./gradlew embedSwiftExportForXcode
          -Pkotlin.data.dir="$KOTLINMANIA_LOCAL_CACHE_DIR/konan"
          -Pkonan.data.dir="$KOTLINMANIA_LOCAL_CACHE_DIR/konan"
          --rerun-tasks
          --no-configuration-cache

      - name: Run swift test against Kotlin-exported module
        working-directory: swift-test-harness
        run: >
          swift test
          --cache-path "$KOTLINMANIA_LOCAL_CACHE_DIR/swiftpm/cache"
          --config-path "$KOTLINMANIA_LOCAL_CACHE_DIR/swiftpm/config"
          --security-path "$KOTLINMANIA_LOCAL_CACHE_DIR/swiftpm/security"
          --scratch-path "$KOTLINMANIA_LOCAL_CACHE_DIR/swiftpm/scratch/harness"
          --disable-sandbox

      - name: Upload Swift Export artifacts
        if: success() || failure()
        uses: actions/upload-artifact@v7
        with:
          name: swift-export-artifacts
          path: |
            build/swift-test/libLibwebrtc.a
            build/swift-test/*.swiftmodule/
            build/SPMPackage/macosArm64/Debug/
          retention-days: 7
          if-no-files-found: warn
